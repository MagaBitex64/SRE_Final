version: '3.8'

services:

  postgres:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - microservices-net
    deploy:
      replicas: 1

  auth-service:
    image: microservices_project-auth-service:latest
    env_file: ./auth-service/.env
    networks:
      - microservices-net
    depends_on:
      - postgres
    deploy:
      replicas: 2
  product-service:
    image: microservices_project-product-service:latest
    env_file: ./product-service/.env
    networks:
      - microservices-net
    depends_on:
      - postgres
    deploy:
      replicas: 2

  order-service:
    image: microservices_project-order-service:latest
    env_file: ./order-service/.env
    networks:
      - microservices-net
    depends_on:
      - postgres
    deploy:
      replicas: 3

  user-profile-service:
    image: microservices_project-user-profile-service:latest
    env_file: ./user-profile-service/.env
    networks:
      - microservices-net
    depends_on:
      - postgres
    deploy:
      replicas: 1

  review-service:
    image: microservices_project-review-service:latest
    env_file: ./review-service/.env
    networks:
      - microservices-net
    depends_on:
      - postgres
    deploy:
      replicas: 1

  audit-service:
    image: microservices_project-audit-service:latest
    env_file: ./audit-service/.env
    networks:
      - microservices-net
    depends_on:
      - postgres
    deploy:
      replicas: 1
  
  frontend:
    image: microservices_project-frontend:latest
    ports:
      - "8080:80"
    networks:
      - microservices-net
    deploy:
      replicas: 1
  

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks:
      - microservices-net
    deploy:
      replicas: 1

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - microservices-net
    deploy:
      replicas: 1

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - microservices-net
    deploy:
      replicas: 1

networks:
  microservices-net:
    driver: overlay

volumes:
  postgres_data:
  grafana_data: