name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/microservices

jobs:

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, product-service, order-service, user-profile-service, review-service, audit-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r ${{ matrix.service }}/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 ${{ matrix.service }}/main.py \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,E401,W292,F401

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [auth-service, product-service, order-service, user-profile-service, review-service, audit-service, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for Ansible)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Write dynamic inventory
        run: |
          cat > ansible/inventory.ini << EOF
          [app_servers]
          ${{ secrets.SERVER_IP }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

      - name: Set image tag variable
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          ansible-playbook ansible/playbook.yml \
            -i ansible/inventory.ini \
            -e "image_tag=${IMAGE_TAG}" \
            -e "registry=${REGISTRY}" \
            -e "image_prefix=${IMAGE_PREFIX}" \
            -e "postgres_user=${{ secrets.POSTGRES_USER }}" \
            -e "postgres_password=${{ secrets.POSTGRES_PASSWORD }}" \
            -e "postgres_db=${{ secrets.POSTGRES_DB }}" \
            -e "secret_key=${{ secrets.SECRET_KEY }}" \
            -e "auth_database_url=${{ secrets.AUTH_DATABASE_URL }}" \
            -e "product_database_url=${{ secrets.PRODUCT_DATABASE_URL }}" \
            -e "order_database_url=${{ secrets.ORDER_DATABASE_URL }}" \
            -e "user_profile_database_url=${{ secrets.USER_DATABASE_URL }}" \
            -e "review_database_url=${{ secrets.REVIEW_DATABASE_URL }}" \
            -e "audit_database_url=${{ secrets.AUDIT_DATABASE_URL }}" \
            -e "github_actor=${{ github.actor }}" \
            -e "github_token=${{ secrets.GITHUB_TOKEN }}"

      - name: Health check
        run: |
          sleep 15
          curl -f http://${{ secrets.SERVER_IP }}:8080 || exit 1
          echo "Deployment successful!"