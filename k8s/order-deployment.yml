apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: microservices_project-order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: ORDER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sre-secret
                  key: ORDER_DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: app
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003