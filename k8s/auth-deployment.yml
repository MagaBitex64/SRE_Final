apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: microservices_project-auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: AUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AUTH_DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: app
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001