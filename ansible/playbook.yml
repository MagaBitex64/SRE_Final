---
- name: Deploy Microservices
  hosts: app_servers
  become: true

  vars:
    app_dir: /opt/microservices
    registry: "{{ registry | default('ghcr.io') }}"
    image_prefix: "{{ image_prefix | default('myorg/microservices') }}"
    image_tag: "{{ image_tag | default('latest') }}"

  tasks:
    - name: Install required packages
      apt:
        name: [docker.io, docker-compose, curl]
        state: present
        update_cache: true

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Create service directories
      file:
        path: "{{ app_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - auth-service
        - product-service
        - order-service
        - user-profile-service
        - review-service
        - audit-service

    - name: Copy docker-compose file
      copy:
        src: ../docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"

    - name: Create root .env
      copy:
        dest: "{{ app_dir }}/.env"
        content: |
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_DB={{ postgres_db }}

    - name: Create auth-service .env
      copy:
        dest: "{{ app_dir }}/auth-service/.env"
        content: |
          DATABASE_URL={{ auth_database_url }}
          SECRET_KEY={{ secret_key }}

    - name: Create product-service .env
      copy:
        dest: "{{ app_dir }}/product-service/.env"
        content: |
          DATABASE_URL={{ product_database_url }}

    - name: Create order-service .env
      copy:
        dest: "{{ app_dir }}/order-service/.env"
        content: |
          DATABASE_URL={{ order_database_url }}

    - name: Create user-profile-service .env
      copy:
        dest: "{{ app_dir }}/user-profile-service/.env"
        content: |
          DATABASE_URL={{ user_profile_database_url }}

    - name: Create review-service .env
      copy:
        dest: "{{ app_dir }}/review-service/.env"
        content: |
          DATABASE_URL={{ review_database_url }}

    - name: Create audit-service .env
      copy:
        dest: "{{ app_dir }}/audit-service/.env"
        content: |
          DATABASE_URL={{ audit_database_url }}

    - name: Copy init SQL
      copy:
        src: ../init-db.sql
        dest: "{{ app_dir }}/init-db.sql"

    - name: Copy Prometheus config
      copy:
        src: ../prometheus/
        dest: "{{ app_dir }}/prometheus/"

    - name: Log in to GitHub Container Registry
      command: >
        docker login ghcr.io
        -u {{ github_actor }}
        -p {{ github_token }}
      no_log: true

    - name: Force stop all containers
      shell: |
        docker stop $(docker ps -aq) 2>/dev/null || true
        docker rm $(docker ps -aq) 2>/dev/null || true
        docker network rm microservices-net 2>/dev/null || true
      ignore_errors: true

    - name: Pull latest images
      command: >
        docker pull {{ registry }}/{{ image_prefix }}-{{ item }}:{{ image_tag }}
      loop:
        - auth-service
        - product-service
        - order-service
        - user-profile-service
        - review-service
        - audit-service
        - frontend

    - name: Update docker-compose to use registry images
      replace:
        path: "{{ app_dir }}/docker-compose.yml"
        regexp: "build: ./{{ item }}"
        replace: "image: {{ registry }}/{{ image_prefix }}-{{ item }}:{{ image_tag }}"
      loop:
        - auth-service
        - product-service
        - order-service
        - user-profile-service
        - review-service
        - audit-service
        - frontend

    - name: Start services
      command: docker-compose up -d
      args:
        chdir: "{{ app_dir }}"

    - name: Clean up old images
      command: docker image prune -f